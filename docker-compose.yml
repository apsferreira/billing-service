## docker-compose.yml — billing-service (desenvolvimento local)
## Requer shared-infra UP: cd ../shared-infra && docker compose up -d

version: "3.9"

services:
  billing-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    environment:
      PORT: "3030"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/billing_db?sslmode=disable"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      NFSE_ENVIRONMENT: "homologacao"
      NFSE_PROVIDER_CNPJ: ""
      NFSE_PROVIDER_IM: ""
      NFSE_ITEM_LISTA: "01.07"
      NFSE_ALIQUOTA: "5.0"
      AUTH_SERVICE_URL: "http://auth-service:3010"
      SERVICE_TOKEN: ""
      SERVICE_NAME: "billing-service"
      SERVICE_VERSION: "1.0.0"
    networks:
      - shared-infra
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: billing_db
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - shared-infra

volumes:
  billing_postgres_data:

networks:
  shared-infra:
    external: true
