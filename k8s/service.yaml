# =============================================================================
# billing-service — Service K8s
# Exposto apenas internamente (ClusterIP) — sem ingress público (R4 / política CF Tunnel)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: production
  labels:
    app: billing-service
    team: apsferreira
spec:
  selector:
    app: billing-service
  ports:
    - name: http
      protocol: TCP
      port: 3030
      targetPort: 3030
  type: ClusterIP
